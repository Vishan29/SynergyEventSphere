spring:
  application:
    name: ems
  config:
    # Load secrets from a local dotfile (parsed as .properties).
    # The real `.env` is git-ignored; see `.env.example` for the template.
    import:
      - optional:file:./.env[.properties]

  # Datasource credentials come from `.env` (spring.datasource.*).
  # The driver class is auto-detected from the URL by Spring Boot.
  datasource:
    hikari:
      pool-name: ses-pool
      maximum-pool-size: 10

  jpa:
    # Flyway owns the schema. Hibernate only validates that the entity
    # model matches what the migrations produced; it must never alter
    # the database itself.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allow adopting Flyway on databases that already have the schema
    # (created by an earlier `ddl-auto: update` run). The first time
    # Flyway sees a non-empty schema with no history table, it stamps
    # the baseline at V1 and resumes from V2 onward.
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true

app:
  jwt:
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    issuer: ses-ems
    # `secret` is injected from ./.env (key: app.jwt.secret) or APP_JWT_SECRET env var.

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.security: info
