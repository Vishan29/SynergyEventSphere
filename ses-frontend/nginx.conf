# SynergyEventSphere frontend — nginx site config.
#
# Mirrors the Vite dev-server proxy: /api/* is forwarded to the Spring Boot
# backend (service name `backend` on the compose network) and everything else
# falls back to index.html so React Router can handle client-side routing.

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for fingerprinted Vite assets.
    location /assets/ {
        try_files $uri =404;
        expires   1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy API calls to the backend service. The backend exposes
    # endpoints under /api/* so we forward the path through unchanged.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # SPA history fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sensible defaults.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json application/xml image/svg+xml;

    # Don't leak nginx version.
    server_tokens off;
}
